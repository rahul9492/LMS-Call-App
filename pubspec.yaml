name: lms_call_app
description: "LMS Call App - Lead Management System with call log tracking and sync."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3

  # Code Generation / Immutable Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0



  # Local Database (SQLite via Drift)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Networking
  dio: ^5.6.0
  pretty_dio_logger: ^1.4.0

  # Connectivity
  connectivity_plus: ^6.0.5

  # Call Log Access
  call_log: ^5.0.2

  # Permissions
  permission_handler: ^11.3.1

  # Background Sync
  workmanager: ^0.9.0

  # Dialer / SMS / Contacts intents
  url_launcher: ^6.3.0

  # Local notifications (background sync result)
  flutter_local_notifications: ^18.0.0

  # Shared Preferences (for settings/flags)
  shared_preferences: ^2.3.2

  # UI
  google_fonts: ^6.2.1
  flutter_slidable: ^3.1.1
  shimmer: ^3.0.0
  timeago: ^3.7.0
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

  # Code Generation — using latest versions compatible with analyzer 7.x
  build_runner: ^2.5.4
  freezed: ^3.2.3
  json_serializable: ^6.9.5
  riverpod_generator: ^3.0.3
  drift_dev: ^2.28.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/call_app_icon.png"
  min_sdk_android: 21
